<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <filter id="premium-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Clean White Background -->
  <rect width="1024" height="1024" rx="224" fill="#ffffff" />
  
  <!-- Enlarged Minimalist Geometry -->
  <g filter="url(#premium-shadow)">
    <!-- Top Left Bracket -->
    <path d="M 160 320 L 160 160 L 320 160" fill="none" stroke="#111827" stroke-width="72" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Bottom Right Bracket -->
    <path d="M 864 704 L 864 864 L 704 864" fill="none" stroke="#111827" stroke-width="72" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Central T Letter mark -->
    <path d="M 320 400 L 704 400 M 512 400 L 512 760" fill="none" stroke="#3b82f6" stroke-width="88" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
